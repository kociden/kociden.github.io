<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="藤野さん勉強会の3つのLP案">
  <title>藤野さん勉強会 | LP検討案</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #1d2520;
      --muted: #667069;
      --line: #d8ddd9;
      --soft: #f5f7f5;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      background: var(--white);
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .skip-link {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 10;
      padding: 10px 14px;
      color: var(--white);
      background: var(--ink);
      transform: translateY(-160%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .container {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
    }

    header {
      display: flex;
      min-height: 68px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--line);
    }

    header p {
      margin: 0;
      font-size: 13px;
      font-weight: 800;
    }

    header p:last-child {
      color: var(--muted);
      font-weight: 600;
    }

    main {
      padding: 68px 0 80px;
    }

    .intro {
      max-width: 680px;
      margin-bottom: 48px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 42px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .intro p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 600;
      line-height: 1.8;
    }

    .options {
      border-top: 1px solid var(--line);
    }

    .option {
      display: grid;
      grid-template-columns: 56px 220px minmax(0, 1fr) 134px;
      gap: 24px;
      align-items: center;
      min-height: 170px;
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      transition: background-color 160ms ease;
    }

    .option:hover {
      background: var(--soft);
    }

    .option:focus-visible {
      outline: 3px solid var(--ink);
      outline-offset: 3px;
    }

    .number {
      align-self: flex-start;
      padding-top: 4px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .option img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 16 / 10;
      object-fit: cover;
      border-radius: 4px;
      background: var(--soft);
    }

    .copy {
      min-width: 0;
    }

    .copy h2 {
      margin: 0 0 9px;
      font-size: 24px;
      line-height: 1.4;
      letter-spacing: 0;
    }

    .copy p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 600;
      line-height: 1.75;
    }

    .open {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      border-radius: 4px;
      color: var(--white);
      background: var(--ink);
      font-size: 13px;
      font-weight: 800;
    }

    footer {
      min-height: 64px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 700px) {
      .container {
        width: min(100% - 32px, 560px);
      }

      header {
        min-height: 62px;
      }

      main {
        padding: 48px 0 64px;
      }

      .intro {
        margin-bottom: 36px;
      }

      h1 {
        font-size: 34px;
      }

      .option {
        grid-template-columns: 1fr auto;
        gap: 14px 16px;
        padding: 24px 0 28px;
      }

      .number {
        grid-column: 1;
        grid-row: 1;
        align-self: center;
        padding: 0;
      }

      .open {
        grid-column: 2;
        grid-row: 1;
        min-height: 38px;
      }

      .option img {
        grid-column: 1 / -1;
        grid-row: 2;
      }

      .copy {
        grid-column: 1 / -1;
        grid-row: 3;
      }

      .copy h2 {
        font-size: 22px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#options">3つの案へ移動</a>

  <header class="container">
    <p>藤野さん勉強会</p>
    <p>LP検討案</p>
  </header>

  <main class="container">
    <section class="intro" aria-labelledby="page-title">
      <h1 id="page-title">3つの案</h1>
      <p>藤野さん勉強会の伝え方を、3つの切り口で作りました。それぞれのページを開いて比較できます。</p>
    </section>

    <nav class="options" id="options" aria-label="LP案一覧">
      <a class="option" href="proposal-01/">
        <span class="number">案1</span>
        <img src="proposal-01/assets/fujino-study-session.jpg" alt="藤野さん勉強会で参加者が対話している様子" width="1824" height="1368">
        <div class="copy">
          <h2>同期との集い</h2>
          <p>同期と、すでに動いているプロジェクトから価値を伝える案です。</p>
        </div>
        <span class="open">この案を見る</span>
      </a>

      <a class="option" href="proposal-02/">
        <span class="number">案2</span>
        <img src="proposal-02/assets/PXL_20260424_105403471.jpg" alt="藤野さん勉強会で参加者が発表している様子" width="1200" height="900">
        <div class="copy">
          <h2>なんとなくを終わらせる</h2>
          <p>予想できる未来への違和感から、金曜の対話へつなげる案です。</p>
        </div>
        <span class="open">この案を見る</span>
      </a>

      <a class="option" href="proposal-03/">
        <span class="number">案3</span>
        <img src="proposal-03/assets/PXL_20260306_100706715.MP.jpg" alt="藤野さん勉強会で参加者が話している様子" width="1200" height="900">
        <div class="copy">
          <h2>現代の松下村塾</h2>
          <p>向いている人、得られるもの、実績から全体像を伝える案です。</p>
        </div>
        <span class="open">この案を見る</span>
      </a>
    </nav>
  </main>

  <footer></footer>
</body>
</html>
