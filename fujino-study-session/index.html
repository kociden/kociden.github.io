<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="藤野さん勉強会の3つのLP案">
  <title>藤野さん勉強会 | LP検討案</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #111512;
      --paper: #f1f2ed;
      --surface: #fbfbf8;
      --steel: #c9ccc6;
      --muted: #5f655f;
      --signal: #f2cf32;
    }

    * {
      box-sizing: border-box;
    }

    html {
      background: var(--paper);
    }

    body {
      margin: 0;
      min-width: 320px;
      color: var(--ink);
      background:
        linear-gradient(rgba(17, 21, 18, 0.035) 1px, transparent 1px),
        var(--paper);
      background-size: 100% 32px;
      font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: inherit;
    }

    .skip-link {
      position: fixed;
      top: 8px;
      left: 8px;
      z-index: 10;
      padding: 10px 14px;
      color: var(--surface);
      background: var(--ink);
      transform: translateY(-160%);
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    .frame {
      width: min(1240px, calc(100% - 48px));
      margin: 0 auto;
      border-right: 1px solid var(--ink);
      border-left: 1px solid var(--ink);
      background: var(--surface);
    }

    header {
      display: flex;
      min-height: 72px;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      border-bottom: 2px solid var(--ink);
    }

    .brand,
    .edition {
      margin: 0;
      font-size: 13px;
      font-weight: 900;
    }

    .edition {
      color: var(--muted);
      font-family: Consolas, "Courier New", monospace;
    }

    main {
      padding: 0 24px 72px;
    }

    .intro {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.52fr);
      gap: 56px;
      align-items: end;
      min-height: 290px;
      padding: 56px 0 40px;
    }

    .kicker {
      display: inline-block;
      margin: 0 0 20px;
      padding: 7px 10px;
      background: var(--signal);
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(48px, 7vw, 92px);
      line-height: 0.98;
      letter-spacing: 0;
    }

    .intro p:last-child {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.9;
    }

    .proposal-list {
      border-top: 2px solid var(--ink);
    }

    .proposal {
      display: grid;
      grid-template-columns: 88px 280px minmax(0, 1fr) 72px;
      min-height: 200px;
      align-items: stretch;
      border-bottom: 1px solid var(--ink);
      text-decoration: none;
      transition: background-color 180ms ease;
    }

    .proposal:hover {
      background: var(--signal);
    }

    .proposal:focus-visible {
      outline: 4px solid var(--ink);
      outline-offset: -4px;
    }

    .number {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 25px;
      border-right: 1px solid var(--ink);
      font-family: Consolas, "Courier New", monospace;
      font-size: 34px;
      font-weight: 900;
    }

    figure {
      position: relative;
      min-height: 200px;
      margin: 0;
      overflow: hidden;
      border-right: 1px solid var(--ink);
      background: var(--steel);
    }

    figure img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(1) contrast(1.08);
      transition: filter 180ms ease, transform 300ms ease;
    }

    .proposal:hover figure img {
      filter: grayscale(0) contrast(1);
      transform: scale(1.02);
    }

    .copy {
      display: flex;
      min-width: 0;
      flex-direction: column;
      justify-content: center;
      padding: 28px 34px;
    }

    .copy h2 {
      margin: 0 0 10px;
      font-size: clamp(23px, 2.5vw, 34px);
      line-height: 1.3;
      letter-spacing: 0;
    }

    .copy p {
      max-width: 590px;
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      line-height: 1.8;
    }

    .proposal:hover .copy p {
      color: var(--ink);
    }

    .arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      border-left: 1px solid var(--ink);
      font-family: Consolas, "Courier New", monospace;
      font-size: 30px;
      font-weight: 900;
    }

    footer {
      display: flex;
      min-height: 64px;
      align-items: center;
      justify-content: flex-end;
      padding: 0 24px;
      border-top: 1px solid var(--ink);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }

    @media (max-width: 760px) {
      .frame {
        width: 100%;
        border: 0;
      }

      header {
        min-height: 64px;
        padding: 0 16px;
      }

      .edition {
        font-size: 10px;
      }

      main {
        padding: 0 16px 48px;
      }

      .intro {
        grid-template-columns: 1fr;
        gap: 24px;
        min-height: 0;
        padding: 48px 0 36px;
      }

      h1 {
        font-size: 52px;
      }

      .intro p:last-child {
        max-width: 32em;
        font-size: 14px;
      }

      .proposal {
        grid-template-columns: 56px minmax(0, 1fr) 48px;
        min-height: 0;
      }

      .number {
        grid-column: 1;
        grid-row: 1;
        padding-top: 24px;
        font-size: 23px;
      }

      figure {
        grid-column: 1 / -1;
        grid-row: 2;
        min-height: 0;
        aspect-ratio: 16 / 9;
        border-top: 1px solid var(--ink);
        border-right: 0;
      }

      .copy {
        grid-column: 2;
        grid-row: 1;
        min-height: 132px;
        padding: 22px 16px;
      }

      .copy h2 {
        margin-bottom: 7px;
        font-size: 22px;
      }

      .copy p {
        font-size: 12px;
        line-height: 1.65;
      }

      .arrow {
        grid-column: 3;
        grid-row: 1;
        font-size: 24px;
      }

      footer {
        min-height: 56px;
        padding: 0 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#proposals">3つの案へ移動</a>

  <div class="frame">
    <header>
      <p class="brand">藤野さん勉強会</p>
      <p class="edition">LP検討案 / 03</p>
    </header>

    <main>
      <section class="intro" aria-labelledby="page-title">
        <div>
          <p class="kicker">3案を比較</p>
          <h1 id="page-title">3つの視点。</h1>
        </div>
        <p>同じ勉強会を、異なる入口から伝える3案です。内容を比べて、もっとも届く構成を選んでください。</p>
      </section>

      <nav class="proposal-list" id="proposals" aria-label="LP案一覧">
        <a class="proposal" href="proposal-01/">
          <span class="number">01</span>
          <figure>
            <img src="proposal-01/assets/fujino-study-session.jpg" alt="藤野さん勉強会で参加者が対話している様子" width="1824" height="1368">
          </figure>
          <div class="copy">
            <h2>同期との集い</h2>
            <p>同期と、すでに動いているプロジェクトから価値を伝える。</p>
          </div>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a class="proposal" href="proposal-02/">
          <span class="number">02</span>
          <figure>
            <img src="proposal-02/assets/PXL_20260424_105403471.jpg" alt="藤野さん勉強会で参加者が発表している様子" width="1200" height="900">
          </figure>
          <div class="copy">
            <h2>なんとなくを終わらせる</h2>
            <p>予想できる未来への違和感から、金曜の対話へつなげる。</p>
          </div>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a class="proposal" href="proposal-03/">
          <span class="number">03</span>
          <figure>
            <img src="proposal-03/assets/PXL_20260306_100706715.MP.jpg" alt="藤野さん勉強会で参加者が話している様子" width="1200" height="900">
          </figure>
          <div class="copy">
            <h2>現代の松下村塾</h2>
            <p>向いている人、得られるもの、実績から全体像を伝える。</p>
          </div>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </nav>
    </main>

    <footer>比較検討用ページ</footer>
  </div>
</body>
</html>
